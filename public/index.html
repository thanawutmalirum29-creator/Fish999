<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>เกมตกปลา</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Kanit&display=swap" rel="stylesheet" />
</head>
<body>

<div class="container">
  <h1>🎣 เกมตกปลา</h1>
  <div id="moneyDisplay">💰 เงิน: <span id="moneyAmount">0</span> G</div>

  <!-- ปุ่มโปรไฟล์ลอย -->
  <div id="profileBox" class="floating-box" onclick="openProfile()">👤 โปรไฟล์</div>

  <!-- Popup โปรไฟล์ -->
  <div id="profileModal" class="modal">
    <div class="modal-content profile-card">
      <span class="close" onclick="closeProfile()">&times;</span>
      <h2>🎣 โปรไฟล์ผู้เล่น</h2>
      <div class="profile-row"><strong>🪪 ชื่อ:</strong> <span id="profileName">Player</span></div>
      <div class="profile-row"><strong>🆔 ไอดี:</strong> <span id="profileId">-</span></div>
      <div class="profile-row"><strong>💰 เงิน:</strong> <span id="profileMoney">0</span> G</div>
      <div class="profile-row"><strong>🎯 น้ำหนักรวม:</strong> <span id="profileTotalWeight">0</span> กก.</div>
      <div class="profile-row"><strong>🏆 ตัวหนักสุด:</strong> <span id="profileBiggestFish">-</span></div>
      <div class="profile-row"><strong>🐟 จำนวนชนิดที่จับได้:</strong> <span id="profileFishTypes">0</span></div>
    </div>
  </div>

  <!-- ปุ่มข้อมูลปลา -->
  <button id="fishInfoBtn" class="floating-box">ข้อมูลปลา</button>
  <div id="fishInfoPopup" class="fish-info-popup"></div>

  <!-- เลือกสถานที่ -->
  <div class="card">
    <label for="location">เลือกสถานที่ตกปลา:</label>
    <select id="location" onchange="changeLocation(this)">
      <!-- โหลดจาก API -->
    </select>
    <button id="startFishingBtn" onclick="startFishing()">เริ่มตกปลา</button>
  </div>

  <!-- มินิเกม -->
  <div id="minigame" class="card" style="display: none;">
    <h3>🕹️ กดตอนแถบอยู่ในสีเขียว!</h3>
    <div id="barContainer">
      <div id="targetZone"></div>
      <div id="movingBar"></div>
    </div>
    <p id="hitCounter">ความสำเร็จ: </p>
    <button onclick="tryCatchFish()">✅ จับเลย!</button>
  </div>

  <!-- inventory + สถิติ -->
  <div class="grid">
    <div id="inventory" class="card">
      <h3>🎒 ปลาที่ตกได้ล่าสุด</h3>
      <ul id="inventoryList"></ul>
    </div>

    <div id="stats" class="card">
      <h3>📊 สถิติ</h3>
      <p id="totalWeight">🎯 น้ำหนักรวม: 0 กก.</p>
      <p id="heaviestFish">🏆 ตัวหนักสุด: -</p>
      <p id="totalCasts">🎣 จำนวนปลาที่ตกได้: 0</p>
    </div>
  </div>

  <a href="/museum.html"><button>🏛️ พิพิธภัณฑ์ปลา</button></a>
  <a href="/storage.html"><button>📦 คลังปลา</button></a>
</div>

<script src="/js/game.js"></script>

</body>
</html>
